openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: YouTube Channel Feed API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: channels
    description: Favourite YouTube channels
  - name: videos
    description: YouTube videos from favourite channels
  - name: ai
    description: AI-powered features
  - name: beats
    description: Beat channels and beat videos
  - name: storage
    description: Object storage upload
  - name: recordings
    description: Cloud-saved freestyle recordings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List favourite channels
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      operationId: addChannel
      tags: [channels]
      summary: Add a favourite channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddChannelRequest"
      responses:
        "201":
          description: Channel added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /channels/search:
    get:
      operationId: searchChannels
      tags: [channels]
      summary: Search YouTube channels by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelSearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /channels/{id}:
    delete:
      operationId: removeChannel
      tags: [channels]
      summary: Remove a favourite channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Channel removed
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List recent videos from favourite channels
      parameters:
        - name: channelId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by specific channel DB id
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
        "500":
          description: API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /beat-channels:
    get:
      operationId: listBeatChannels
      tags: [beats]
      summary: List beat channels
      responses:
        "200":
          description: List of beat channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      operationId: addBeatChannel
      tags: [beats]
      summary: Add a beat channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddChannelRequest"
      responses:
        "201":
          description: Beat channel added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /beat-channels/search:
    get:
      operationId: searchBeatChannels
      tags: [beats]
      summary: Search YouTube channels for beat producers
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelSearchResult"
  /beat-channels/{id}:
    delete:
      operationId: removeBeatChannel
      tags: [beats]
      summary: Remove a beat channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Beat channel removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /beats:
    get:
      operationId: listBeats
      tags: [beats]
      summary: List recent beats from beat channels
      parameters:
        - name: channelId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of beats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
        "500":
          description: API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /beats/search:
    get:
      operationId: searchBeats
      tags: [beats]
      summary: Search YouTube for beats by query
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [relevance, date, viewCount]
            default: relevance
          description: Sort order
        - name: maxResults
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
        "500":
          description: API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /beats/{videoId}/similar:
    get:
      operationId: getSimilarBeats
      tags: [beats]
      summary: Get similar beats for a given video
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
        - name: title
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Similar beats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
  /videos/summary:
    post:
      operationId: getVideoSummary
      tags: [ai]
      summary: Generate AI summary for a video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoSummaryRequest"
      responses:
        "200":
          description: AI-generated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoSummaryResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
  /yoga:
    get:
      operationId: listYogaVideos
      tags: [yoga]
      summary: List saved yoga videos
      parameters:
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: List of yoga videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YogaVideo"
    post:
      operationId: addYogaVideo
      tags: [yoga]
      summary: Add a yoga video by URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddYogaVideoBody"
      responses:
        "201":
          description: Added yoga video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YogaVideo"
  /yoga/{videoId}:
    patch:
      operationId: updateYogaVideoCategory
      tags: [yoga]
      summary: Update a yoga video's category
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYogaCategoryBody"
      responses:
        "200":
          description: Updated yoga video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YogaVideo"
    delete:
      operationId: removeYogaVideo
      tags: [yoga]
      summary: Remove a yoga video
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /saved:
    get:
      operationId: listSavedVideos
      tags: [recordings]
      summary: List all saved videos
      responses:
        "200":
          description: List of saved videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedVideoItem"
    post:
      operationId: saveVideo
      tags: [recordings]
      summary: Save a video by URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveVideoBody"
      responses:
        "201":
          description: Saved video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedVideoItem"
  /saved/{videoId}:
    get:
      operationId: checkSavedVideo
      tags: [recordings]
      summary: Check if a video is saved
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Saved status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedVideoStatus"
        "404":
          description: Not saved
    delete:
      operationId: removeSavedVideo
      tags: [recordings]
      summary: Remove a saved video
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /recordings:
    get:
      operationId: listRecordings
      tags: [recordings]
      summary: List all saved recordings
      responses:
        "200":
          description: List of recordings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecordingItem"
    post:
      operationId: createRecording
      tags: [recordings]
      summary: Save a new recording metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordingBody"
      responses:
        "201":
          description: Created recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingItem"
  /recordings/{id}:
    delete:
      operationId: deleteRecording
      tags: [recordings]
      summary: Delete a recording
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /daw/projects:
    get:
      operationId: listDawProjects
      tags: [recordings]
      summary: List all saved DAW projects
      responses:
        "200":
          description: List of DAW projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DawProjectItem"
    post:
      operationId: createDawProject
      tags: [recordings]
      summary: Save a new DAW project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDawProjectBody"
      responses:
        "201":
          description: Created DAW project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DawProjectItem"
  /daw/projects/{id}:
    get:
      operationId: getDawProject
      tags: [recordings]
      summary: Get a single DAW project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: DAW project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DawProjectItem"
        "404":
          description: Not found
    delete:
      operationId: deleteDawProject
      tags: [recordings]
      summary: Delete a DAW project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Channel:
      type: object
      properties:
        id:
          type: integer
        youtubeChannelId:
          type: string
        name:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        addedAt:
          type: string
          format: date-time
      required:
        - id
        - youtubeChannelId
        - name
        - addedAt
    AddChannelRequest:
      type: object
      properties:
        youtubeChannelId:
          type: string
          description: YouTube channel ID (starts with UC...) or handle (@username)
      required:
        - youtubeChannelId
    Video:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
        viewCount:
          type: string
          nullable: true
        channelId:
          type: string
        channelName:
          type: string
        channelThumbnailUrl:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
      required:
        - videoId
        - title
        - description
        - thumbnailUrl
        - publishedAt
        - channelId
        - channelName
    ChannelSearchResult:
      type: object
      properties:
        youtubeChannelId:
          type: string
        name:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        subscriberCount:
          type: string
          nullable: true
      required:
        - youtubeChannelId
        - name
        - description
    VideoSummaryRequest:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        description:
          type: string
        channelName:
          type: string
      required:
        - videoId
        - title
        - description
        - channelName
    VideoSummaryResponse:
      type: object
      properties:
        summary:
          type: string
      required:
        - summary
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType
    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath
    RecordingItem:
      type: object
      properties:
        id:
          type: integer
        beatVideoId:
          type: string
        beatTitle:
          type: string
        beatChannelName:
          type: string
        beatThumbnailUrl:
          type: string
        objectPath:
          type: string
        durationSeconds:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - beatVideoId
        - beatTitle
        - beatChannelName
        - beatThumbnailUrl
        - objectPath
        - durationSeconds
        - createdAt
    CreateRecordingBody:
      type: object
      properties:
        beatVideoId:
          type: string
        beatTitle:
          type: string
        beatChannelName:
          type: string
        beatThumbnailUrl:
          type: string
        objectPath:
          type: string
        durationSeconds:
          type: integer
      required:
        - beatVideoId
        - beatTitle
        - beatChannelName
        - beatThumbnailUrl
        - objectPath
        - durationSeconds
    DawLane:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        muted:
          type: boolean
        volume:
          type: number
        startOffset:
          type: number
        durationSec:
          type: number
        objectPath:
          type: string
          nullable: true
        mime:
          type: string
      required:
        - id
        - name
        - color
        - muted
        - volume
        - startOffset
        - durationSec
        - mime
    DawProjectItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        beatVideoId:
          type: string
        beatTitle:
          type: string
        beatChannelName:
          type: string
        beatThumbnailUrl:
          type: string
        lanes:
          type: array
          items:
            $ref: "#/components/schemas/DawLane"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - beatVideoId
        - beatTitle
        - beatChannelName
        - beatThumbnailUrl
        - lanes
        - createdAt
        - updatedAt
    YogaVideo:
      type: object
      properties:
        id:
          type: integer
        videoId:
          type: string
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        channelId:
          type: string
        channelName:
          type: string
        channelThumbnailUrl:
          type: string
          nullable: true
        viewCount:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
        publishedAt:
          type: string
        category:
          type: string
          nullable: true
        savedAt:
          type: string
      required:
        - id
        - videoId
        - title
        - description
        - thumbnailUrl
        - channelId
        - channelName
        - publishedAt
        - savedAt
    AddYogaVideoBody:
      type: object
      properties:
        url:
          type: string
        category:
          type: string
          nullable: true
      required:
        - url
    UpdateYogaCategoryBody:
      type: object
      properties:
        category:
          type: string
          nullable: true
      required: []
    SavedVideoItem:
      type: object
      properties:
        id:
          type: integer
        videoId:
          type: string
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        channelId:
          type: string
        channelName:
          type: string
        channelThumbnailUrl:
          type: string
          nullable: true
        viewCount:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
        publishedAt:
          type: string
        savedAt:
          type: string
        mp3Ready:
          type: boolean
      required:
        - id
        - videoId
        - title
        - description
        - thumbnailUrl
        - channelId
        - channelName
        - publishedAt
        - savedAt
        - mp3Ready
    SaveVideoBody:
      type: object
      properties:
        url:
          type: string
      required:
        - url
    SavedVideoStatus:
      type: object
      properties:
        saved:
          type: boolean
      required:
        - saved
    CreateDawProjectBody:
      type: object
      properties:
        name:
          type: string
        beatVideoId:
          type: string
        beatTitle:
          type: string
        beatChannelName:
          type: string
        beatThumbnailUrl:
          type: string
        lanes:
          type: array
          items:
            $ref: "#/components/schemas/DawLane"
      required:
        - name
        - beatVideoId
        - beatTitle
        - beatChannelName
        - beatThumbnailUrl
        - lanes
